document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;animation:vs-rise .4s ease both .75s;\\\">\\n        <div style=\\\"flex:none;width:24px;height:24px;border-radius:50%;background:rgba(22,184,166,.16);display:flex;align-items:center;justify-content:center;\\\"><div style=\\\"width:11px;height:6px;border-left:2.5px solid #16B8A6;border-bottom:2.5px solid #16B8A6;transform:rotate(-45deg) translateY(-1px);\\\"><\u002Fdiv><\u002Fdiv>\\n        <span style=\\\"font-size:16px;line-height:1.42;color:#dfeceb;\\\">Identity linked to your <b style=\\\"color:#fff;\\\">existing KYC<\u002Fb><\u002Fspan>\\n      <\u002Fdiv>\\n    <\u002Fdiv>\\n    <div style=\\\"text-align:center;padding-bottom:40px;font-size:13px;color:#7fa0a6;animation:vs-pulse 1.3s ease-in-out infinite;\\\">Returning to FaceLOOK…<\u002Fdiv>\\n  <\u002Fdiv>\\n  <\u002Fsc-if>\\n\\n  <!-- ===================== 5 · UNLOCKED ===================== -->\\n  <sc-if value=\\\"{{ isUnlocked }}\\\" hint-placeholder-val=\\\"{{ false }}\\\">\\n  <div style=\\\"position:absolute;inset:0;background:#ffffff;color:#16181c;display:flex;flex-direction:column;\\\">\\n    <div style=\\\"display:flex;justify-content:space-between;align-items:center;padding:13px 22px 4px;font:600 14px 'IBM Plex Sans';color:#16181c;\\\">\\n      <span>9:41<\u002Fspan>\\n      <div style=\\\"width:24px;height:12px;border:1.5px solid #16181c;border-radius:3px;position:relative;opacity:.85;\\\"><div style=\\\"position:absolute;inset:1.5px;width:62%;background:#16181c;border-radius:1px;\\\"><\u002Fdiv><\u002Fdiv>\\n    <\u002Fdiv>\\n    <div style=\\\"flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:10px 30px 28px;\\\">\\n      <div style=\\\"display:flex;align-items:center;gap:8px;margin-top:6px;\\\">\\n        <div style=\\\"width:26px;height:26px;border-radius:8px;background:#6C4DFF;color:#fff;display:flex;align-items:center;justify-content:center;font:800 14px 'Plus Jakarta Sans';\\\">F<\u002Fdiv>\\n        <span style=\\\"font:800 16px 'Plus Jakarta Sans';lette 2Fsc-if>\\n\\n<\u002Fdiv>\";\n  var J = \"class Component extends DCLogic {\\n  renderVals() {\\n    const s = this.props.screen || 'landing';\\n    return {\\n      isLanding: s === 'landing',\\n      isLoading: s === 'loading',\\n      isConsent: s === 'consent',\\n      isScanning: s === 'scanning',\\n      isVerified: s === 'verified',\\n      isUnlocked: s === 'unlocked',\\n      onVerify: this.props.onVerify || (() => {}),\\n      onDeny: this.props.onDeny || (() => {}),\\n      onRestart: this.props.onRestart || (() => {}),\\n    };\\n  }\\n}\";\n  function reg(){\n    if(!window.__dcUpdate){ return setTimeout(reg, 15); }\n    try{\n      window.__dcUpdate('VerifyScreen','js', J);\n      window.__dcUpdate('VerifyScreen','html', H);\n      var R = window.__dcRegistry && window.__dcRegistry['VerifyScreen'];\n      if(R){ R.fetched = true; }\n    }catch(e){ console.error('[standalone] child register failed', e); }\n  }\n  reg();\n})();\n<\u002Fscript>\n<\u002Fhelmet>\n\n\n\n<div id=\"avpage\" style=\"min-height:100vh;box-sizing:border-box;background:#e7e5df;font-family:'IBM Plex Sans',system-ui,sans-serif;color:#1c2024;padding:clamp(24px,5vw,48px) 16px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:24px;\">\n\n  <!-- HEADER -->\n  <div id=\"avhead\" style=\"width:100%;max-width:520px;text-align:center;display:flex;flex-direction:column;gap:8px;\">\n    <span style=\"font-size:12px;letter-spacing:2px;font-weight:600;color:#16B8A6;\">FACELOOK × SANADFY<\u002Fspan>\n    <h1 style=\"margin:0;font:800 clamp(24px,5vw,30px) 'Plus Jakarta Sans';letter-spacing:-.6px;line-height:1.08;\">Age Verification<\u002Fh1>\n  <\u002Fdiv>\n\n  <!-- INTERACTIVE PHONE (bezel on desktop, full-bleed on mobile) -->\n  <div id=\"avdevice\" style=\"position:relative;width:min(348px,88vw);aspect-ratio:390/844;background:#0a0a0c;border-radius:46px;padding:11px;box-sizing:border-box;box-shadow:0 36px 70px -24px rgba(24,34,44,.55),0 0 0 2px #20212a;\">\n    <div id=\"avinner\" style=\"position:relative;width:100%;height:100%;border-radius:35px;overflow:hidden;background:#000;\">\n      <div id=\"avnotch\" style=\"position:absolute;top:0;left:50%;transform:translateX(-50%);width:40%;height:26px;background:#0a0a0c;border-radius:0 0 16px 16px;z-index:30;\"><\u002Fdiv>\n      <dc-import name=\"VerifyScreen\" screen=\"{{ step }}\" on-verify=\"{{ onVerify }}\" on-deny=\"{{ onDeny }}\" on-restart=\"{{ onRestart }}\" hint-size=\"100%,100%\" style=\"position:absolute;inset:0;width:100%;height:100%;\"><\u002Fdc-import>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- step dots + restart -->\n  <div id=\"avfoot\" style=\"display:flex;flex-direction:column;align-items:center;gap:14px;\">\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n      <sc-for list=\"{{ dots }}\" as=\"dot\" hint-placeholder-count=\"5\">\n        <div style=\"width:8px;height:8px;border-radius:50%;transition:all .3s;background:{{ dot.color }};transform:{{ dot.scale }};\"><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px;font-size:14px;color:#6b6f73;\">\n      <span>{{ stepLabel }}<\u002Fspan>\n      <button onclick=\"{{ onRestart }}\" style=\"appearance:none;border:1px solid #cdcac1;background:#f3f1ea;color:#4a4e52;font:600 13px 'IBM Plex Sans';padding:7px 14px;border-radius:99px;cursor:pointer;\">↻ Restart<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { step: 'landing' };\n\n  go(step) {\n    [this.t1, this.t2, this.t3].forEach(clearTimeout);\n    this.setState({ step });\n    if (step === 'loading')  this.t1 = setTimeout(() => this.go('consent'), 600);\n    if (step === 'scanning') this.t2 = setTimeout(() => this.go('verified'), 1000);\n    if (step === 'verified') this.t3 = setTimeout(() => this.go('unlocked'), 4000);\n  }\n\n  componentWillUnmount() { [this.t1, this.t2, this.t3].forEach(clearTimeout); }\n\n  renderVals() {\n    const s = this.state.step;\n    const groupIdx = { landing: 0, loading: 1, consent: 1, scanning: 2, verified: 3, unlocked: 4 }[s];\n    const labels = { landing: 'Step 1 · Age gate', loading: 'Opening Sanadfy…', consent: 'Step 2 · Consent', scanning: 'Step 3 · Liveness', verified: 'Step 4 · Verified', unlocked: 'Step 5 · Unlocked' };\n    const dots = [0, 1, 2, 3, 4].map(i => ({\n      color: i === groupIdx ? '#16B8A6' : '#cdcac1',\n      scale: i === groupIdx ? 'scale(1.35)' : 'scale(1)',\n    }));\n    return {\n      step: s,\n      dots,\n      stepLabel: labels[s],\n      onVerify: () => {\n        const c = this.state.step;\n        if (c === 'landing') this.go('loading');\n        else if (c === 'consent') this.go('scanning');\n      },\n      onDeny: () => this.go('landing'),\n      onRestart: () => this.go('landing'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
